<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Golf Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Arial', sans-serif;
    overflow: hidden;
    touch-action: none;
  }
  #gameContainer {
    position: relative;
    width: 100%;
    max-width: 900px;
  }
  canvas {
    display: block;
    width: 100%;
    touch-action: none;
    cursor: crosshair;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.82);
    color: white;
    text-align: center;
    padding: 20px;
  }
  #overlay h1 { font-size: clamp(1.4rem, 5vw, 2.2rem); margin-bottom: 10px; color: #4ade80; }
  #overlay h2 { font-size: clamp(1rem, 4vw, 1.6rem); margin-bottom: 8px; color: #facc15; }
  #overlay p  { font-size: clamp(0.8rem, 3vw, 1rem); margin: 4px 0; color: #ccc; }
  #overlay .score-table { margin: 12px 0; width: 100%; max-width: 400px; border-collapse: collapse; }
  #overlay .score-table td, #overlay .score-table th {
    border: 1px solid #444; padding: 5px 8px; font-size: clamp(0.7rem, 2.5vw, 0.9rem);
  }
  #overlay .score-table th { background: #1e3a5f; color: #7dd3fc; }
  #overlay .score-table .total-row td { background: #1a2a1a; color: #4ade80; font-weight: bold; }
  #overlay .under  { color: #4ade80; }
  #overlay .over   { color: #f87171; }
  #overlay .even   { color: #facc15; }
  #bigBtn {
    margin-top: 16px;
    padding: 14px 40px;
    font-size: clamp(1rem, 4vw, 1.3rem);
    background: #16a34a;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 4px 15px rgba(22,163,74,0.5);
  }
  #bigBtn:hover { background: #15803d; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="gameContainer">
  <canvas id="c"></canvas>
  <div id="overlay">
    <h1>⛳ Golf</h1>
    <p style="font-size:clamp(0.9rem,3.5vw,1.1rem); margin:10px 0; color:#e2e8f0;">2-Player Turn-Based</p>
    <p>Drag back from the ball to aim &amp; set power.</p>
    <p>Release to swing!</p>
    <p style="margin-top:8px;">9 holes · Compete for the lowest score</p>
    <button id="bigBtn" onclick="startGame()">Start Game</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 900, H = 420;
canvas.width  = W;
canvas.height = H;

const HOLES = [
  { par: 3, wind: 0.04,
    terrain: [[0,0.75],[0.3,0.75],[0.5,0.65],[0.7,0.65],[1,0.65],[1,1],[0,1]],
    tee: {x:0.07, y:0.73}, pin: {x:0.9, y:0.63} },
  { par: 3, wind: -0.03,
    terrain: [[0,0.72],[0.25,0.72],[0.45,0.48],[0.55,0.48],[0.75,0.72],[1,0.72],[1,1],[0,1]],
    tee: {x:0.07, y:0.70}, pin: {x:0.91, y:0.70} },
  { par: 4, wind: 0.05,
    terrain: [[0,0.78],[0.5,0.78],[0.65,0.60],[0.75,0.55],[1,0.55],[1,1],[0,1]],
    tee: {x:0.06, y:0.76}, pin: {x:0.91, y:0.53} },
  { par: 3, wind: -0.06,
    terrain: [[0,0.62],[0.25,0.62],[0.4,0.78],[0.5,0.80],[0.6,0.78],[0.75,0.62],[1,0.62],[1,1],[0,1]],
    tee: {x:0.07, y:0.60}, pin: {x:0.91, y:0.60} },
  { par: 5, wind: 0.07,
    terrain: [[0,0.73],[0.35,0.73],[0.42,0.82],[0.5,0.82],[0.57,0.73],[1,0.73],[1,1],[0,1]],
    tee: {x:0.05, y:0.71}, pin: {x:0.93, y:0.71} },
  { par: 4, wind: -0.05,
    terrain: [[0,0.65],[0.45,0.65],[0.55,0.80],[1,0.80],[1,1],[0,1]],
    tee: {x:0.06, y:0.63}, pin: {x:0.92, y:0.78} },
  { par: 4, wind: 0.06,
    terrain: [[0,0.75],[0.18,0.75],[0.28,0.55],[0.38,0.55],[0.48,0.72],[0.58,0.72],[0.68,0.50],[0.78,0.50],[1,0.68],[1,1],[0,1]],
    tee: {x:0.07, y:0.73}, pin: {x:0.88, y:0.66} },
  { par: 3, wind: 0.03,
    terrain: [[0,0.50],[0.2,0.50],[0.5,0.65],[0.8,0.78],[1,0.80],[1,1],[0,1]],
    tee: {x:0.07, y:0.48}, pin: {x:0.90, y:0.78} },
  { par: 5, wind: -0.08,
    terrain: [[0,0.70],[0.15,0.70],[0.25,0.55],[0.35,0.55],[0.45,0.70],[0.55,0.80],[0.65,0.68],[0.80,0.68],[0.90,0.55],[1,0.55],[1,1],[0,1]],
    tee: {x:0.06, y:0.68}, pin: {x:0.93, y:0.53} }
];

let state, ball, drag, scores, holeIdx, playerTurn, holeStrokes, windNow;
let camX = 0, targetCamX = 0;
let trailPoints = [];
let celebrating = false, celebTimer = 0;
let ballInHole = false;
let splashParticles = [];

const PLAYERS = ['Player 1', 'Player 2'];
const PLAYER_COLORS = ['#60a5fa', '#fb923c'];

function startGame() {
  holeIdx     = 0;
  playerTurn  = 0;
  scores      = [[],[]];
  document.getElementById('overlay').classList.add('hidden');
  startHole();
}

function startHole() {
  const h = HOLES[holeIdx];
  windNow = h.wind + (Math.random()-0.5)*0.03;
  camX    = 0;
  targetCamX = 0;
  trailPoints = [];
  splashParticles = [];
  celebrating  = false;
  ballInHole   = false;
  holeStrokes  = [0, 0];
  placeBallAtTee();
  state = 'aiming';
  drag  = null;
  showHoleBanner();
}

function placeBallAtTee() {
  const h    = HOLES[holeIdx];
  ball = { x: h.tee.x * W, y: h.tee.y * H, vx: 0, vy: 0 };
}

function getTerrainPoints(hole) {
  return hole.terrain.map(p => [p[0]*W, p[1]*H]);
}

function terrainYatX(x, hole) {
  const pts = getTerrainPoints(hole);
  const topPts = pts.slice(0, pts.length - 2);
  for (let i = 0; i < topPts.length-1; i++) {
    const ax = topPts[i][0], ay = topPts[i][1];
    const bx = topPts[i+1][0], by = topPts[i+1][1];
    if (x >= ax && x <= bx) {
      const t = (x - ax) / (bx - ax);
      return ay + t*(by-ay);
    }
  }
  return H * 0.75;
}

let banner = null;
function showHoleBanner() {
  banner = { text: `Hole ${holeIdx+1}  —  Par ${HOLES[holeIdx].par}`, alpha: 1, timer: 120 };
}

function getEventPos(e) {
  const r = canvas.getBoundingClientRect();
  const scaleX = W / r.width;
  const scaleY = H / r.height;
  let cx, cy;
  if (e.touches) {
    const t = e.changedTouches[0];
    cx = (t.clientX - r.left) * scaleX;
    cy = (t.clientY - r.top)  * scaleY;
  } else {
    cx = (e.clientX - r.left) * scaleX;
    cy = (e.clientY - r.top)  * scaleY;
  }
  return { x: cx + camX, y: cy };
}

canvas.addEventListener('mousedown',  onStart);
canvas.addEventListener('touchstart', onStart, {passive:false});
canvas.addEventListener('mousemove',  onMove);
canvas.addEventListener('touchmove',  onMove, {passive:false});
canvas.addEventListener('mouseup',    onEnd);
canvas.addEventListener('touchend',   onEnd, {passive:false});

function onStart(e) {
  e.preventDefault();
  if (state !== 'aiming') return;
  drag = getEventPos(e);
}
function onMove(e) {
  e.preventDefault();
  if (!drag || state !== 'aiming') return;
  drag.cur = getEventPos(e);
}
function onEnd(e) {
  e.preventDefault();
  if (!drag || state !== 'aiming') return;
  if (!drag.cur) { drag = null; return; }
  shoot();
}

function shoot() {
  const dx = ball.x - drag.cur.x;
  const dy = ball.y - drag.cur.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < 5) { drag = null; return; }
  const power = Math.min(dist / 120, 1);
  const speed  = power * 22;
  ball.vx = (dx / dist) * speed;
  ball.vy = (dy / dist) * speed;
  holeStrokes[playerTurn]++;
  drag  = null;
  state = 'flying';
  trailPoints = [];
}

const GRAVITY = 0.45;
const BOUNCE  = 0.42;
const FRICTION= 0.82;
const HOLE_RADIUS = 14;

function update() {
  if (banner) {
    banner.timer--;
    if (banner.timer <= 0) banner = null;
  }
  targetCamX = 0;
  camX += (targetCamX - camX) * 0.1;
  splashParticles = splashParticles.filter(p => p.life > 0);
  splashParticles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 2;
  });
  if (state !== 'flying') return;
  ball.vx += windNow;
  ball.vy += GRAVITY;
  ball.x += ball.vx;
  ball.y += ball.vy;
  const hole   = HOLES[holeIdx];
  const ground = terrainYatX(ball.x, hole);
  if (ball.y >= ground - 5) {
    ball.y  = ground - 5;
    ball.vy = -ball.vy * BOUNCE;
    ball.vx *= FRICTION;
    for (let i = 0; i < 6; i++) {
      splashParticles.push({
        x: ball.x, y: ground,
        vx: (Math.random()-0.5)*3,
        vy: -Math.random()*3,
        life: 40+Math.random()*20
      });
    }
  }
  if (ball.x < 5)  { ball.x = 5;  ball.vx =  Math.abs(ball.vx)*0.5; }
  if (ball.x > W-5){ ball.x = W-5; ball.vx = -Math.abs(ball.vx)*0.5; }
  if (ball.y < 5)  { ball.vy = Math.abs(ball.vy)*0.3; }
  trailPoints.push({x: ball.x, y: ball.y, a: 0.6});
  const px = hole.pin.x * W;
  const py = terrainYatX(hole.pin.x * W, hole) - 2;
  const dx = ball.x - px;
  const dy = ball.y - py;
  if (Math.sqrt(dx*dx+dy*dy) < HOLE_RADIUS && Math.abs(ball.vx) < 6) {
    ball.x = px; ball.y = py;
    ball.vx = 0; ball.vy = 0;
    state = 'holed';
    ballInHole = true;
    celebrating = true; celebTimer = 90;
    setTimeout(afterHole, 1800);
    return;
  }
  const speed = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
  if (speed < 0.3 && Math.abs(ball.y - (ground-5)) < 3) {
    ball.vx = 0; ball.vy = 0;
    state = 'aiming';
    trailPoints = [];
  }
}

function afterHole() {
  scores[playerTurn].push(holeStrokes[playerTurn]);
  if (playerTurn === 0 && scores[1].length <= scores[0].length - 1) {
    playerTurn = 1;
    placeBallAtTee();
    holeStrokes[1] = 0;
    state = 'aiming';
    drag = null;
    trailPoints = [];
    ballInHole = false;
    celebrating = false;
    showPlayerBanner(1);
  } else {
    if (holeIdx < 8) {
      playerTurn = 0;
      holeIdx++;
      startHole();
    } else {
      showFinalScore();
    }
  }
}

let playerBanner = null;
function showPlayerBanner(p) {
  playerBanner = { text: `${PLAYERS[p]}'s Turn`, alpha:1, timer:100, color: PLAYER_COLORS[p] };
}

function drawSky() {
  const sky = ctx.createLinearGradient(0,0,0,H*0.6);
  sky.addColorStop(0, '#0f172a');
  sky.addColorStop(1, '#164e63');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  [[80,60,120,35],[250,45,90,28],[500,55,150,40],[700,40,100,30]].forEach(([x,y,w,h])=>{
    ctx.beginPath();
    ctx.ellipse(x,y,w,h,0,0,Math.PI*2);
    ctx.fill();
  });
}

function drawTerrain(hole) {
  const pts = getTerrainPoints(hole);
  const grad = ctx.createLinearGradient(0,H*0.4,0,H);
  grad.addColorStop(0,'#16a34a');
  grad.addColorStop(0.15,'#15803d');
  grad.addColorStop(0.15,'#92400e');
  grad.addColorStop(1,'#78350f');
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  const topLen = pts.length - 2;
  for (let i=1;i<topLen;i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.strokeStyle = '#4ade80';
  ctx.lineWidth = 2.5;
  ctx.stroke();
}

function drawFlag(hole) {
  const px = hole.pin.x * W;
  const py = terrainYatX(hole.pin.x*W, hole);
  ctx.beginPath();
  ctx.ellipse(px, py-1, 10, 4, 0, 0, Math.PI*2);
  ctx.fillStyle = '#111';
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(px, py-2);
  ctx.lineTo(px, py-55);
  ctx.strokeStyle = '#d1d5db';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(px, py-55);
  ctx.lineTo(px+22, py-46);
  ctx.lineTo(px, py-37);
  ctx.closePath();
  ctx.fillStyle = '#ef4444';
  ctx.fill();
}

function drawTee(hole) {
  const tx = hole.tee.x * W;
  const ty = terrainYatX(hole.tee.x*W, hole);
  ctx.fillStyle = '#fbbf24';
  ctx.fillRect(tx-12, ty-3, 24, 3);
}

function drawBall() {
  if (ballInHole && !celebrating) return;
  ctx.save();
  ctx.shadowColor = PLAYER_COLORS[playerTurn];
  ctx.shadowBlur  = celebrating ? 20 : 8;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y-5, 7, 0, Math.PI*2);
  ctx.fillStyle = 'white';
  ctx.fill();
  ctx.strokeStyle = '#cbd5e1';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(ball.x-2, ball.y-7, 2, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.fill();
  ctx.restore();
}

function drawTrail() {
  if (trailPoints.length < 2) return;
  for (let i=1;i<trailPoints.length;i++) {
    const a = trailPoints[i].a * (i/trailPoints.length);
    ctx.beginPath();
    ctx.moveTo(trailPoints[i-1].x, trailPoints[i-1].y-5);
    ctx.lineTo(trailPoints[i].x, trailPoints[i].y-5);
    ctx.strokeStyle = `rgba(253,224,71,${a})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

function drawAimGuide() {
  if (state !== 'aiming' || !drag || !drag.cur) return;
  const dx = ball.x - drag.cur.x;
  const dy = ball.y - drag.cur.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const power = Math.min(dist/120, 1);
  const speed = power * 22;
  let sx = ball.x, sy = ball.y-5, svx = (dx/dist)*speed, svy = (dy/dist)*speed;
  ctx.save();
  for (let i=0;i<12;i++) {
    svx += windNow; svy += GRAVITY;
    sx += svx; sy += svy;
    const a = 0.7 - i*0.055;
    ctx.beginPath();
    ctx.arc(sx, sy, 3-i*0.15, 0, Math.PI*2);
    ctx.fillStyle = `rgba(253,224,71,${a})`;
    ctx.fill();
  }
  ctx.restore();
  const barW = 80, barH = 10;
  const bx = ball.x - camX - barW/2;
  const by = ball.y - 35;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.roundRect(bx-2, by-2, barW+4, barH+4, 4);
  ctx.fill();
  const col = power < 0.5 ? '#4ade80' : power < 0.8 ? '#facc15' : '#ef4444';
  ctx.fillStyle = col;
  ctx.roundRect(bx, by, barW*power, barH, 3);
  ctx.fill();
  ctx.strokeStyle = '#94a3b8';
  ctx.lineWidth = 1;
  ctx.roundRect(bx, by, barW, barH, 3);
  ctx.stroke();
}

function drawHUD() {
  const hole = HOLES[holeIdx];
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, 38);
  ctx.fillStyle = '#94a3b8';
  ctx.font = 'bold 13px Arial';
  ctx.fillText(`HOLE ${holeIdx+1}/9`, 10, 24);
  ctx.fillStyle = '#fbbf24';
  ctx.fillText(`PAR ${hole.par}`, 90, 24);
  const wDir = windNow > 0 ? '→' : '←';
  const wStr = Math.abs(windNow * 100).toFixed(0);
  ctx.fillStyle = '#7dd3fc';
  ctx.fillText(`WIND ${wDir} ${wStr}`, W/2-50, 24);
  ctx.fillStyle = PLAYER_COLORS[playerTurn];
  ctx.font = 'bold 13px Arial';
  const pLabel = `${PLAYERS[playerTurn]}  ${holeStrokes[playerTurn]} stroke${holeStrokes[playerTurn]!==1?'s':''}`;
  ctx.fillText(pLabel, W - ctx.measureText(pLabel).width - 10, 24);
  const sx = 10, sy = 50;
  scores[0].forEach((s,i) => {
    const par = HOLES[i].par;
    const diff = s - par;
    ctx.font = '10px Arial';
    ctx.fillStyle = diff < 0 ? '#4ade80' : diff > 0 ? '#f87171' : '#fbbf24';
    ctx.fillText(`H${i+1}: ${PLAYERS[0][0]}${s} ${PLAYERS[1][0]}${scores[1][i]??'-'}`, sx, sy+i*14);
  });
}

function drawParticles() {
  splashParticles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2.5, 0, Math.PI*2);
    ctx.fillStyle = `rgba(134,97,60,${p.life/60})`;
    ctx.fill();
  });
}

function drawCelebration() {
  if (!celebrating) return;
  celebTimer--;
  if (celebTimer <= 0) celebrating = false;
  const t = 1 - celebTimer/90;
  for (let i=0;i<3;i++) {
    const angle = Math.random()*Math.PI*2;
    const r = t*60;
    ctx.beginPath();
    ctx.arc(ball.x+Math.cos(angle)*r, ball.y-5+Math.sin(angle)*r, 3, 0, Math.PI*2);
    ctx.fillStyle = `hsl(${Math.random()*360},90%,65%)`;
    ctx.fill();
  }
  const strokes = holeStrokes[playerTurn];
  const par     = HOLES[holeIdx].par;
  const diff    = strokes - par;
  const names   = ['Albatross!','Eagle!','Birdie!','Par','Bogey','Double Bogey','Triple+'];
  const idx     = diff + 3;
  const label   = names[Math.max(0,Math.min(6,idx))];
  const colors  = ['#a78bfa','#facc15','#4ade80','#60a5fa','#fb923c','#f87171','#ef4444'];
  ctx.save();
  ctx.font = `bold ${28+Math.sin(celebTimer*0.15)*3}px Arial`;
  ctx.fillStyle = colors[Math.max(0,Math.min(6,idx))];
  ctx.textAlign = 'center';
  ctx.shadowColor = 'black';
  ctx.shadowBlur = 8;
  ctx.fillText(label, W/2, H/2 - 20);
  ctx.font = '18px Arial';
  ctx.fillStyle = 'white';
  ctx.fillText(`${PLAYERS[playerTurn]}: ${strokes} strokes`, W/2, H/2+15);
  ctx.restore();
}

function drawBanner() {
  if (!banner) return;
  banner.timer--;
  const a = Math.min(1, banner.timer / 20);
  ctx.save();
  ctx.globalAlpha = a;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.roundRect(W/2-150, H/2-30, 300, 55, 10);
  ctx.fill();
  ctx.fillStyle = '#4ade80';
  ctx.font = 'bold 22px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(banner.text, W/2, H/2+8);
  ctx.restore();
  if (banner.timer <= 0) banner = null;
}

function drawPlayerBanner() {
  if (!playerBanner) return;
  playerBanner.timer--;
  const a = Math.min(1, playerBanner.timer/15);
  ctx.save();
  ctx.globalAlpha = a;
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.roundRect(W/2-140, H/2-25, 280, 48, 10);
  ctx.fill();
  ctx.fillStyle = playerBanner.color;
  ctx.font = 'bold 20px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(playerBanner.text, W/2, H/2+7);
  ctx.restore();
  if (playerBanner.timer <= 0) playerBanner = null;
}

function drawDragLine() {
  if (state !== 'aiming' || !drag || !drag.cur) return;
  ctx.save();
  ctx.strokeStyle = 'rgba(148,163,184,0.4)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4,4]);
  ctx.beginPath();
  ctx.moveTo(ball.x, ball.y-5);
  ctx.lineTo(drag.cur.x, drag.cur.y);
  ctx.stroke();
  ctx.restore();
}

function gameLoop() {
  update();
  ctx.save();
  ctx.translate(-camX, 0);
  const hole = HOLES[holeIdx];
  drawSky();
  drawTerrain(hole);
  drawFlag(hole);
  drawTee(hole);
  drawTrail();
  drawParticles();
  drawBall();
  drawDragLine();
  drawAimGuide();
  ctx.restore();
  drawHUD();
  drawCelebration();
  drawBanner();
  drawPlayerBanner();
  requestAnimationFrame(gameLoop);
}

function showFinalScore() {
  const ov = document.getElementById('overlay');
  ov.classList.remove('hidden');
  const t1 = scores[0].reduce((a,b)=>a+b,0);
  const t2 = scores[1].reduce((a,b)=>a+b,0);
  const totalPar = HOLES.reduce((a,h)=>a+h.par, 0);
  const diff1 = t1-totalPar;
  const diff2 = t2-totalPar;
  const winner = t1<t2 ? PLAYERS[0] : t2<t1 ? PLAYERS[1] : 'Tie';
  let rows = '';
  for (let i=0;i<9;i++) {
    const par = HOLES[i].par;
    const s1 = scores[0][i]??'-', s2 = scores[1][i]??'-';
    const c1 = typeof s1==='number' ? (s1<par?'under':s1>par?'over':'even') : '';
    const c2 = typeof s2==='number' ? (s2<par?'under':s2>par?'over':'even') : '';
    rows += `<tr><td>H${i+1}</td><td>Par ${par}</td><td class="${c1}">${s1}</td><td class="${c2}">${s2}</td></tr>`;
  }
  const tc1 = diff1<0?'under':diff1>0?'over':'even';
  const tc2 = diff2<0?'under':diff2>0?'over':'even';
  ov.innerHTML = `
    <h1>&#9971; Final Scorecard</h1>
    <h2>${winner === 'Tie' ? "It's a Tie!" : `&#127942; ${winner} Wins!`}</h2>
    <table class="score-table">
      <tr><th>Hole</th><th>Par</th><th style="color:${PLAYER_COLORS[0]}">${PLAYERS[0]}</th><th style="color:${PLAYER_COLORS[1]}">${PLAYERS[1]}</th></tr>
      ${rows}
      <tr class="total-row">
        <td colspan="2">TOTAL</td>
        <td class="${tc1}">${t1} (${diff1>=0?'+':''}${diff1})</td>
        <td class="${tc2}">${t2} (${diff2>=0?'+':''}${diff2})</td>
      </tr>
    </table>
    <button id="bigBtn" onclick="location.reload()">Play Again</button>
  `;
}

gameLoop();
</script>
</body>
</html>
