<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Golf Game</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#0a0a1a; overflow:hidden; touch-action:none; }
  body { display:flex; align-items:center; justify-content:center; }
  canvas { display:block; max-width:100%; max-height:100%; touch-action:none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 900, H = 460;
canvas.width = W; canvas.height = H;

// Fit canvas to screen
function resize() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width  = (W * s) + 'px';
  canvas.style.height = (H * s) + 'px';
}
window.addEventListener('resize', resize);
resize();

const HOLES = [
  { par:3, wind:0.04, terrain:[[0,.75],[.3,.75],[.5,.65],[.7,.65],[1,.65],[1,1],[0,1]], tee:{x:.07,y:.73}, pin:{x:.9,y:.63} },
  { par:3, wind:-.03, terrain:[[0,.72],[.25,.72],[.45,.48],[.55,.48],[.75,.72],[1,.72],[1,1],[0,1]], tee:{x:.07,y:.70}, pin:{x:.91,y:.70} },
  { par:4, wind:.05,  terrain:[[0,.78],[.5,.78],[.65,.60],[.75,.55],[1,.55],[1,1],[0,1]], tee:{x:.06,y:.76}, pin:{x:.91,y:.53} },
  { par:3, wind:-.06, terrain:[[0,.62],[.25,.62],[.4,.78],[.5,.80],[.6,.78],[.75,.62],[1,.62],[1,1],[0,1]], tee:{x:.07,y:.60}, pin:{x:.91,y:.60} },
  { par:5, wind:.07,  terrain:[[0,.73],[.35,.73],[.42,.82],[.5,.82],[.57,.73],[1,.73],[1,1],[0,1]], tee:{x:.05,y:.71}, pin:{x:.93,y:.71} },
  { par:4, wind:-.05, terrain:[[0,.65],[.45,.65],[.55,.80],[1,.80],[1,1],[0,1]], tee:{x:.06,y:.63}, pin:{x:.92,y:.78} },
  { par:4, wind:.06,  terrain:[[0,.75],[.18,.75],[.28,.55],[.38,.55],[.48,.72],[.58,.72],[.68,.50],[.78,.50],[1,.68],[1,1],[0,1]], tee:{x:.07,y:.73}, pin:{x:.88,y:.66} },
  { par:3, wind:.03,  terrain:[[0,.50],[.2,.50],[.5,.65],[.8,.78],[1,.80],[1,1],[0,1]], tee:{x:.07,y:.48}, pin:{x:.90,y:.78} },
  { par:5, wind:-.08, terrain:[[0,.70],[.15,.70],[.25,.55],[.35,.55],[.45,.70],[.55,.80],[.65,.68],[.80,.68],[.90,.55],[1,.55],[1,1],[0,1]], tee:{x:.06,y:.68}, pin:{x:.93,y:.53} }
];

const PLAYERS = ['Player 1','Player 2'];
const PCOL    = ['#60a5fa','#fb923c'];

// ── game state ────────────────────────────────────────────────────
let screen = 'start'; // 'start' | 'play' | 'end'
let ball, drag, scores, holeIdx, playerTurn, holeStrokes, windNow;
let trailPoints=[], celebrating=false, celebTimer=0, ballInHole=false, splashParticles=[];
let banner=null, playerBanner=null;
let playState; // 'aiming' | 'flying' | 'holed'

// ── terrain ───────────────────────────────────────────────────────
function getTP(hole) { return hole.terrain.map(p=>[p[0]*W, p[1]*H]); }
function terrainY(x, hole) {
  const top = getTP(hole).slice(0, -2);
  for (let i=0; i<top.length-1; i++) {
    const [ax,ay]=top[i], [bx,by]=top[i+1];
    if (x>=ax && x<=bx) return ay + (x-ax)/(bx-ax)*(by-ay);
  }
  return H*.75;
}

// ── start game ───────────────────────────────────────────────────
function startGame() {
  screen='play'; holeIdx=0; playerTurn=0; scores=[[],[]];
  startHole();
}

function startHole() {
  const h = HOLES[holeIdx];
  windNow = h.wind + (Math.random()-.5)*.03;
  trailPoints=[]; splashParticles=[];
  celebrating=false; ballInHole=false; holeStrokes=[0,0];
  ball = { x:h.tee.x*W, y:h.tee.y*H, vx:0, vy:0 };
  playState='aiming'; drag=null;
  banner = { text:`Hole ${holeIdx+1}  —  Par ${h.par}`, timer:120 };
}

// ── input ─────────────────────────────────────────────────────────
function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const sx = W/r.width, sy = H/r.height;
  const src = e.touches ? e.changedTouches[0] : e;
  return { x:(src.clientX-r.left)*sx, y:(src.clientY-r.top)*sy };
}

canvas.addEventListener('touchstart', onDown, {passive:false});
canvas.addEventListener('mousedown',  onDown);
canvas.addEventListener('touchmove',  onMove, {passive:false});
canvas.addEventListener('mousemove',  onMove);
canvas.addEventListener('touchend',   onUp,   {passive:false});
canvas.addEventListener('mouseup',    onUp);

function onDown(e) {
  e.preventDefault();
  const p = getPos(e);
  if (screen === 'start') { startGame(); return; }
  if (screen === 'end')   { screen='start'; return; }
  if (playState === 'aiming') drag = p;
}
function onMove(e) {
  e.preventDefault();
  if (drag && playState==='aiming') drag.cur = getPos(e);
}
function onUp(e) {
  e.preventDefault();
  if (drag && playState==='aiming') {
    if (drag.cur) shoot(); else drag=null;
  }
}

function shoot() {
  const dx=ball.x-drag.cur.x, dy=ball.y-drag.cur.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if (dist<5) { drag=null; return; }
  const spd = Math.min(dist/120,1)*22;
  ball.vx=dx/dist*spd; ball.vy=dy/dist*spd;
  holeStrokes[playerTurn]++; drag=null; playState='flying'; trailPoints=[];
}

// ── physics ───────────────────────────────────────────────────────
const GRAV=0.45, BOUNCE=0.42, FRIC=0.82, HRAD=15;

function update() {
  if (screen !== 'play') return;
  if (banner && --banner.timer<=0) banner=null;
  if (playerBanner && --playerBanner.timer<=0) playerBanner=null;
  splashParticles = splashParticles.filter(p=>p.life>0);
  splashParticles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.life-=2;});
  if (playState!=='flying') return;

  ball.vx+=windNow; ball.vy+=GRAV; ball.x+=ball.vx; ball.y+=ball.vy;
  const hole=HOLES[holeIdx], gnd=terrainY(ball.x,hole);

  if (ball.y>=gnd-5) {
    ball.y=gnd-5; ball.vy=-ball.vy*BOUNCE; ball.vx*=FRIC;
    for(let i=0;i<5;i++) splashParticles.push({x:ball.x,y:gnd,vx:(Math.random()-.5)*3,vy:-Math.random()*3,life:40});
  }
  if (ball.x<5)   { ball.x=5;   ball.vx= Math.abs(ball.vx)*.5; }
  if (ball.x>W-5) { ball.x=W-5; ball.vx=-Math.abs(ball.vx)*.5; }
  if (ball.y<5)   { ball.vy=Math.abs(ball.vy)*.3; }
  trailPoints.push({x:ball.x, y:ball.y});

  // Check cup
  const px=hole.pin.x*W, py=terrainY(hole.pin.x*W,hole)-2;
  if (Math.hypot(ball.x-px,ball.y-py)<HRAD && Math.abs(ball.vx)<6) {
    ball.x=px; ball.y=py; ball.vx=0; ball.vy=0;
    playState='holed'; ballInHole=true; celebrating=true; celebTimer=90;
    setTimeout(afterHole,1800); return;
  }

  if (Math.hypot(ball.vx,ball.vy)<0.3 && Math.abs(ball.y-(gnd-5))<3) {
    ball.vx=0; ball.vy=0; playState='aiming'; trailPoints=[];
  }
}

function afterHole() {
  scores[playerTurn].push(holeStrokes[playerTurn]);
  if (playerTurn===0 && scores[1].length < scores[0].length) {
    playerTurn=1;
    ball = { x:HOLES[holeIdx].tee.x*W, y:HOLES[holeIdx].tee.y*H, vx:0, vy:0 };
    holeStrokes[1]=0; playState='aiming'; drag=null; trailPoints=[];
    ballInHole=false; celebrating=false;
    playerBanner = { text:"Player 2's Turn", timer:110, col:PCOL[1] };
  } else {
    if (holeIdx<8) { playerTurn=0; holeIdx++; startHole(); }
    else           { screen='end'; }
  }
}

// ── draw helpers ──────────────────────────────────────────────────
function roundRect(x,y,w,h,r) {
  ctx.beginPath(); ctx.roundRect(x,y,w,h,r); 
}

function drawStart() {
  // Background
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0f172a'); g.addColorStop(1,'#0c3547');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // Stars
  ctx.fillStyle='rgba(255,255,255,0.6)';
  for(let i=0;i<60;i++){const x=(i*137.5)%W,y=(i*97.3)%H*.6;ctx.fillRect(x,y,1.5,1.5);}
  // Title
  ctx.save();
  ctx.textAlign='center';
  ctx.font='bold 72px Arial';
  ctx.fillStyle='#4ade80';
  ctx.shadowColor='#16a34a'; ctx.shadowBlur=20;
  ctx.fillText('GOLF',W/2,H/2-90);
  ctx.font='24px Arial';
  ctx.fillStyle='#94a3b8'; ctx.shadowBlur=0;
  ctx.fillText('2-Player Turn-Based  |  9 Holes',W/2,H/2-45);
  ctx.font='18px Arial';
  ctx.fillStyle='#cbd5e1';
  ctx.fillText('Drag back from the ball to aim & set power',W/2,H/2-5);
  ctx.fillText('Release to shoot!',W/2,H/2+25);
  // Button
  ctx.shadowColor='#16a34a'; ctx.shadowBlur=15;
  roundRect(W/2-100,H/2+60,200,56,12);
  ctx.fillStyle='#16a34a'; ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='white'; ctx.font='bold 22px Arial';
  ctx.fillText('Tap to Start',W/2,H/2+96);
  ctx.restore();
}

function drawEnd() {
  const t1=scores[0].reduce((a,b)=>a+b,0);
  const t2=scores[1].reduce((a,b)=>a+b,0);
  const tp=HOLES.reduce((a,h)=>a+h.par,0);
  const d1=t1-tp, d2=t2-tp;
  const winner=t1<t2?PLAYERS[0]:t2<t1?PLAYERS[1]:'Tie';

  ctx.fillStyle='#0a0a1a'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='bold 36px Arial'; ctx.fillStyle='#4ade80';
  ctx.fillText('Final Scorecard',W/2,48);
  ctx.font='bold 26px Arial'; ctx.fillStyle='#facc15';
  ctx.fillText(winner==='Tie'?"It's a Tie!":`${winner} Wins!`,W/2,88);

  // Table
  const cols=[W/2-180,W/2-60,W/2+40,W/2+140], rowH=28, startY=120;
  ctx.font='bold 14px Arial';
  ['Hole','Par',PLAYERS[0],PLAYERS[1]].forEach((h,i)=>{ctx.fillStyle='#7dd3fc';ctx.fillText(h,cols[i],startY);});

  for(let i=0;i<9;i++) {
    const y=startY+rowH*(i+1);
    const par=HOLES[i].par, s1=scores[0][i]??'-', s2=scores[1][i]??'-';
    ctx.font='13px Arial';
    ctx.fillStyle='#94a3b8'; ctx.fillText(`H${i+1}`,cols[0],y);
    ctx.fillStyle='#fbbf24'; ctx.fillText(par,cols[1],y);
    const c1=typeof s1==='number'?(s1<par?'#4ade80':s1>par?'#f87171':'#facc15'):'#fff';
    const c2=typeof s2==='number'?(s2<par?'#4ade80':s2>par?'#f87171':'#facc15'):'#fff';
    ctx.fillStyle=c1; ctx.fillText(s1,cols[2],y);
    ctx.fillStyle=c2; ctx.fillText(s2,cols[3],y);
  }
  const ty=startY+rowH*10+4;
  ctx.font='bold 15px Arial';
  ctx.fillStyle='#94a3b8'; ctx.fillText('TOTAL',cols[0],ty);
  const fc1=d1<0?'#4ade80':d1>0?'#f87171':'#facc15';
  const fc2=d2<0?'#4ade80':d2>0?'#f87171':'#facc15';
  ctx.fillStyle=fc1; ctx.fillText(`${t1} (${d1>=0?'+':''}${d1})`,cols[2],ty);
  ctx.fillStyle=fc2; ctx.fillText(`${t2} (${d2>=0?'+':''}${d2})`,cols[3],ty);

  roundRect(W/2-100,H-75,200,50,10);
  ctx.fillStyle='#16a34a'; ctx.fill();
  ctx.fillStyle='white'; ctx.font='bold 18px Arial';
  ctx.fillText('Play Again',W/2,H-43);
}

function drawPlay() {
  const hole=HOLES[holeIdx];
  // Sky
  const sky=ctx.createLinearGradient(0,0,0,H*.6);
  sky.addColorStop(0,'#0f172a'); sky.addColorStop(1,'#164e63');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,0.07)';
  [[80,60,120,35],[250,45,90,28],[500,55,150,40],[700,40,100,30]].forEach(([x,y,w,h])=>{
    ctx.beginPath();ctx.ellipse(x,y,w,h,0,0,Math.PI*2);ctx.fill();
  });
  // Terrain
  const pts=getTP(hole);
  const grad=ctx.createLinearGradient(0,H*.4,0,H);
  grad.addColorStop(0,'#16a34a'); grad.addColorStop(.12,'#15803d');
  grad.addColorStop(.12,'#92400e'); grad.addColorStop(1,'#78350f');
  ctx.beginPath(); pts.forEach(([x,y],i)=>i?ctx.lineTo(x,y):ctx.moveTo(x,y));
  ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
  ctx.beginPath(); pts.slice(0,-2).forEach(([x,y],i)=>i?ctx.lineTo(x,y):ctx.moveTo(x,y));
  ctx.strokeStyle='#4ade80'; ctx.lineWidth=2.5; ctx.stroke();
  // Tee marker
  const tx=hole.tee.x*W, ty2=terrainY(hole.tee.x*W,hole);
  ctx.fillStyle='#fbbf24'; ctx.fillRect(tx-12,ty2-3,24,3);
  // Flag
  const fpx=hole.pin.x*W, fpy=terrainY(hole.pin.x*W,hole);
  ctx.beginPath();ctx.ellipse(fpx,fpy,10,4,0,0,Math.PI*2);ctx.fillStyle='#111';ctx.fill();
  ctx.beginPath();ctx.moveTo(fpx,fpy-1);ctx.lineTo(fpx,fpy-58);ctx.strokeStyle='#d1d5db';ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.moveTo(fpx,fpy-58);ctx.lineTo(fpx+24,fpy-48);ctx.lineTo(fpx,fpy-38);ctx.closePath();ctx.fillStyle='#ef4444';ctx.fill();
  // Trail
  for(let i=1;i<trailPoints.length;i++){
    ctx.beginPath();ctx.moveTo(trailPoints[i-1].x,trailPoints[i-1].y-5);ctx.lineTo(trailPoints[i].x,trailPoints[i].y-5);
    ctx.strokeStyle=`rgba(253,224,71,${.6*i/trailPoints.length})`;ctx.lineWidth=2;ctx.stroke();
  }
  // Particles
  splashParticles.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,2.5,0,Math.PI*2);ctx.fillStyle=`rgba(134,97,60,${p.life/50})`;ctx.fill();});
  // Ball
  if (!ballInHole || celebrating) {
    ctx.save();ctx.shadowColor=PCOL[playerTurn];ctx.shadowBlur=celebrating?22:10;
    ctx.beginPath();ctx.arc(ball.x,ball.y-6,8,0,Math.PI*2);ctx.fillStyle='white';ctx.fill();
    ctx.strokeStyle='#cbd5e1';ctx.lineWidth=1;ctx.stroke();ctx.restore();
  }
  // Aim guide
  if (playState==='aiming' && drag && drag.cur) {
    const dx=ball.x-drag.cur.x, dy=ball.y-drag.cur.y, dist=Math.hypot(dx,dy);
    const pwr=Math.min(dist/120,1), spd=pwr*22;
    let sx=ball.x,sy=ball.y-6,svx=dx/dist*spd,svy=dy/dist*spd;
    ctx.save();
    for(let i=0;i<14;i++){svx+=windNow;svy+=GRAV;sx+=svx;sy+=svy;
      ctx.beginPath();ctx.arc(sx,sy,Math.max(.5,3-i*.2),0,Math.PI*2);
      ctx.fillStyle=`rgba(253,224,71,${.75-i*.05})`;ctx.fill();}
    ctx.restore();
    ctx.save();ctx.setLineDash([5,5]);ctx.strokeStyle='rgba(148,163,184,.35)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(ball.x,ball.y-6);ctx.lineTo(drag.cur.x,drag.cur.y);ctx.stroke();ctx.restore();
    // Power bar
    const bx=ball.x-40, by=ball.y-42;
    ctx.fillStyle='rgba(0,0,0,.6)'; roundRect(bx-2,by-2,84,14,4); ctx.fill();
    ctx.fillStyle=pwr<.5?'#4ade80':pwr<.8?'#facc15':'#ef4444'; roundRect(bx,by,80*pwr,10,3); ctx.fill();
    ctx.strokeStyle='#475569';ctx.lineWidth=1; roundRect(bx,by,80,10,3); ctx.stroke();
  }
  // HUD bar
  ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(0,0,W,40);
  ctx.font='bold 14px Arial'; ctx.textAlign='left';
  ctx.fillStyle='#94a3b8'; ctx.fillText(`HOLE ${holeIdx+1}/9`,10,26);
  ctx.fillStyle='#fbbf24'; ctx.fillText(`PAR ${hole.par}`,100,26);
  ctx.textAlign='center';
  ctx.fillStyle='#7dd3fc';
  ctx.fillText(`WIND ${windNow>0?'→':'←'} ${Math.abs(windNow*100).toFixed(0)}`,W/2,26);
  ctx.textAlign='right'; ctx.fillStyle=PCOL[playerTurn];
  ctx.fillText(`${PLAYERS[playerTurn]}  ${holeStrokes[playerTurn]} stroke${holeStrokes[playerTurn]!==1?'s':''}`,W-10,26);
  // Mini scoreboard
  ctx.textAlign='left'; ctx.font='10px Arial';
  scores[0].forEach((s,i)=>{
    const d=s-HOLES[i].par;
    ctx.fillStyle=d<0?'#4ade80':d>0?'#f87171':'#fbbf24';
    ctx.fillText(`H${i+1}: P1 ${s} / P2 ${scores[1][i]??'-'}`,10,50+i*13);
  });
  // Celebration
  if (celebrating) {
    celebTimer--; if(celebTimer<=0)celebrating=false;
    const t=1-celebTimer/90;
    for(let i=0;i<4;i++){const a=Math.random()*Math.PI*2,r=t*70;
      ctx.beginPath();ctx.arc(ball.x+Math.cos(a)*r,ball.y-6+Math.sin(a)*r,3,0,Math.PI*2);
      ctx.fillStyle=`hsl(${Math.random()*360},90%,65%)`;ctx.fill();}
    const diff=holeStrokes[playerTurn]-hole.par;
    const names=['Albatross!','Eagle!','Birdie!','Par','Bogey','Double Bogey','Triple+'];
    const cols2=['#a78bfa','#facc15','#4ade80','#60a5fa','#fb923c','#f87171','#ef4444'];
    const idx=Math.max(0,Math.min(6,diff+3));
    ctx.save();ctx.textAlign='center';ctx.shadowColor='black';ctx.shadowBlur=10;
    ctx.font=`bold ${30+Math.sin(celebTimer*.15)*3}px Arial`;ctx.fillStyle=cols2[idx];
    ctx.fillText(names[idx],W/2,H/2-18);
    ctx.font='18px Arial';ctx.fillStyle='white';
    ctx.fillText(`${PLAYERS[playerTurn]}: ${holeStrokes[playerTurn]} strokes`,W/2,H/2+14);
    ctx.restore();
  }
  // Banners
  if (banner) {
    const a=Math.min(1,banner.timer/20);
    ctx.save();ctx.globalAlpha=a;ctx.textAlign='center';
    roundRect(W/2-160,H/2-34,320,58,12);ctx.fillStyle='rgba(0,0,0,.7)';ctx.fill();
    ctx.fillStyle='#4ade80';ctx.font='bold 24px Arial';ctx.fillText(banner.text,W/2,H/2+8);
    ctx.restore();
  }
  if (playerBanner) {
    const a=Math.min(1,playerBanner.timer/15);
    ctx.save();ctx.globalAlpha=a;ctx.textAlign='center';
    roundRect(W/2-150,H/2-28,300,52,10);ctx.fillStyle='rgba(0,0,0,.7)';ctx.fill();
    ctx.fillStyle=playerBanner.col;ctx.font='bold 22px Arial';ctx.fillText(playerBanner.text,W/2,H/2+8);
    ctx.restore();
  }
}

// ── main loop ─────────────────────────────────────────────────────
function loop() {
  update();
  if      (screen==='start') drawStart();
  else if (screen==='play')  drawPlay();
  else if (screen==='end')   drawEnd();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
