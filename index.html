<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Golf Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #0a0a1a; overflow: hidden; touch-action: none; }
  body { display: flex; align-items: center; justify-content: center; font-family: Arial, sans-serif; }
  #gameContainer { position: relative; width: 100%; max-width: 900px; }
  canvas { display: block; width: 100%; touch-action: none; cursor: crosshair; position: relative; z-index: 1; }
  #overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 999;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(10,10,26,0.95); color: white; text-align: center; padding: 20px;
  }
  #overlay h1 { font-size: clamp(1.4rem, 5vw, 2.2rem); margin-bottom: 10px; color: #4ade80; }
  #overlay h2 { font-size: clamp(1rem, 4vw, 1.6rem); margin-bottom: 8px; color: #facc15; }
  #overlay p  { font-size: clamp(0.8rem, 3vw, 1rem); margin: 4px 0; color: #ccc; }
  #overlay .score-table { margin: 12px 0; width: 100%; max-width: 400px; border-collapse: collapse; }
  #overlay .score-table td, #overlay .score-table th { border: 1px solid #444; padding: 5px 8px; font-size: clamp(0.7rem, 2.5vw, 0.9rem); }
  #overlay .score-table th { background: #1e3a5f; color: #7dd3fc; }
  #overlay .score-table .total-row td { background: #1a2a1a; color: #4ade80; font-weight: bold; }
  #overlay .under { color: #4ade80; } #overlay .over { color: #f87171; } #overlay .even { color: #facc15; }
  #bigBtn {
    margin-top: 16px; padding: 14px 40px; font-size: clamp(1rem, 4vw, 1.3rem);
    background: #16a34a; color: white; border: none; border-radius: 10px;
    cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(22,163,74,0.5);
  }
  #bigBtn:active { background: #15803d; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="c"></canvas>
  <div id="overlay">
    <h1>&#9971; Golf</h1>
    <p style="font-size:clamp(0.9rem,3.5vw,1.1rem);margin:10px 0;color:#e2e8f0;">2-Player Turn-Based</p>
    <p>Drag back from the ball to aim &amp; set power.</p>
    <p>Release to swing!</p>
    <p style="margin-top:8px;">9 holes &middot; Compete for the lowest score</p>
    <button id="bigBtn" onclick="startGame()">Start Game</button>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 900, H = 420;
canvas.width = W; canvas.height = H;

const HOLES = [
  { par:3, wind:0.04, terrain:[[0,.75],[.3,.75],[.5,.65],[.7,.65],[1,.65],[1,1],[0,1]], tee:{x:.07,y:.73}, pin:{x:.9,y:.63} },
  { par:3, wind:-.03, terrain:[[0,.72],[.25,.72],[.45,.48],[.55,.48],[.75,.72],[1,.72],[1,1],[0,1]], tee:{x:.07,y:.70}, pin:{x:.91,y:.70} },
  { par:4, wind:.05, terrain:[[0,.78],[.5,.78],[.65,.60],[.75,.55],[1,.55],[1,1],[0,1]], tee:{x:.06,y:.76}, pin:{x:.91,y:.53} },
  { par:3, wind:-.06, terrain:[[0,.62],[.25,.62],[.4,.78],[.5,.80],[.6,.78],[.75,.62],[1,.62],[1,1],[0,1]], tee:{x:.07,y:.60}, pin:{x:.91,y:.60} },
  { par:5, wind:.07, terrain:[[0,.73],[.35,.73],[.42,.82],[.5,.82],[.57,.73],[1,.73],[1,1],[0,1]], tee:{x:.05,y:.71}, pin:{x:.93,y:.71} },
  { par:4, wind:-.05, terrain:[[0,.65],[.45,.65],[.55,.80],[1,.80],[1,1],[0,1]], tee:{x:.06,y:.63}, pin:{x:.92,y:.78} },
  { par:4, wind:.06, terrain:[[0,.75],[.18,.75],[.28,.55],[.38,.55],[.48,.72],[.58,.72],[.68,.50],[.78,.50],[1,.68],[1,1],[0,1]], tee:{x:.07,y:.73}, pin:{x:.88,y:.66} },
  { par:3, wind:.03, terrain:[[0,.50],[.2,.50],[.5,.65],[.8,.78],[1,.80],[1,1],[0,1]], tee:{x:.07,y:.48}, pin:{x:.90,y:.78} },
  { par:5, wind:-.08, terrain:[[0,.70],[.15,.70],[.25,.55],[.35,.55],[.45,.70],[.55,.80],[.65,.68],[.80,.68],[.90,.55],[1,.55],[1,1],[0,1]], tee:{x:.06,y:.68}, pin:{x:.93,y:.53} }
];

let state, ball, drag, scores, holeIdx, playerTurn, holeStrokes, windNow;
let camX=0, trailPoints=[], celebrating=false, celebTimer=0, ballInHole=false, splashParticles=[];
const PLAYERS=['Player 1','Player 2'], PLAYER_COLORS=['#60a5fa','#fb923c'];

function startGame() {
  holeIdx=0; playerTurn=0; scores=[[],[]];
  document.getElementById('overlay').classList.add('hidden');
  startHole();
}

function startHole() {
  const h=HOLES[holeIdx];
  windNow=h.wind+(Math.random()-.5)*.03;
  camX=0; trailPoints=[]; splashParticles=[];
  celebrating=false; ballInHole=false; holeStrokes=[0,0];
  placeBallAtTee(); state='aiming'; drag=null; showHoleBanner();
}

function placeBallAtTee() {
  const h=HOLES[holeIdx];
  ball={x:h.tee.x*W, y:h.tee.y*H, vx:0, vy:0};
}

function getTP(hole) { return hole.terrain.map(p=>[p[0]*W,p[1]*H]); }

function terrainY(x, hole) {
  const pts=getTP(hole), top=pts.slice(0,pts.length-2);
  for(let i=0;i<top.length-1;i++) {
    const [ax,ay]=top[i],[bx,by]=top[i+1];
    if(x>=ax&&x<=bx) return ay+(x-ax)/(bx-ax)*(by-ay);
  }
  return H*.75;
}

let banner=null;
function showHoleBanner() { banner={text:`Hole ${holeIdx+1}  —  Par ${HOLES[holeIdx].par}`,timer:120}; }

function getPos(e) {
  const r=canvas.getBoundingClientRect(), sx=W/r.width, sy=H/r.height;
  const src=e.touches?e.changedTouches[0]:e;
  return {x:(src.clientX-r.left)*sx+camX, y:(src.clientY-r.top)*sy};
}

canvas.addEventListener('mousedown', e=>{if(state==='aiming')drag=getPos(e);});
canvas.addEventListener('touchstart', e=>{e.preventDefault();if(state==='aiming')drag=getPos(e);},{passive:false});
canvas.addEventListener('mousemove', e=>{if(drag&&state==='aiming')drag.cur=getPos(e);});
canvas.addEventListener('touchmove', e=>{e.preventDefault();if(drag&&state==='aiming')drag.cur=getPos(e);},{passive:false});
canvas.addEventListener('mouseup', e=>{if(drag&&state==='aiming'){if(drag.cur)shoot();else drag=null;}});
canvas.addEventListener('touchend', e=>{e.preventDefault();if(drag&&state==='aiming'){if(drag.cur)shoot();else drag=null;}},{passive:false});

function shoot() {
  const dx=ball.x-drag.cur.x, dy=ball.y-drag.cur.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<5){drag=null;return;}
  const spd=Math.min(dist/120,1)*22;
  ball.vx=dx/dist*spd; ball.vy=dy/dist*spd;
  holeStrokes[playerTurn]++; drag=null; state='flying'; trailPoints=[];
}

const GRAV=0.45, BOUNCE=0.42, FRIC=0.82, HRAD=14;

function update() {
  if(banner&&--banner.timer<=0)banner=null;
  splashParticles=splashParticles.filter(p=>p.life>0);
  splashParticles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.life-=2;});
  if(state!=='flying')return;
  ball.vx+=windNow; ball.vy+=GRAV; ball.x+=ball.vx; ball.y+=ball.vy;
  const hole=HOLES[holeIdx], gnd=terrainY(ball.x,hole);
  if(ball.y>=gnd-5) {
    ball.y=gnd-5; ball.vy=-ball.vy*BOUNCE; ball.vx*=FRIC;
    for(let i=0;i<6;i++) splashParticles.push({x:ball.x,y:gnd,vx:(Math.random()-.5)*3,vy:-Math.random()*3,life:40+Math.random()*20});
  }
  if(ball.x<5){ball.x=5;ball.vx=Math.abs(ball.vx)*.5;}
  if(ball.x>W-5){ball.x=W-5;ball.vx=-Math.abs(ball.vx)*.5;}
  if(ball.y<5)ball.vy=Math.abs(ball.vy)*.3;
  trailPoints.push({x:ball.x,y:ball.y});
  const px=hole.pin.x*W, py=terrainY(hole.pin.x*W,hole)-2;
  const dx=ball.x-px, dy=ball.y-py;
  if(Math.sqrt(dx*dx+dy*dy)<HRAD&&Math.abs(ball.vx)<6) {
    ball.x=px;ball.y=py;ball.vx=0;ball.vy=0;
    state='holed';ballInHole=true;celebrating=true;celebTimer=90;
    setTimeout(afterHole,1800); return;
  }
  const spd=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
  if(spd<0.3&&Math.abs(ball.y-(gnd-5))<3){ball.vx=0;ball.vy=0;state='aiming';trailPoints=[];}
}

function afterHole() {
  scores[playerTurn].push(holeStrokes[playerTurn]);
  if(playerTurn===0&&scores[1].length<=scores[0].length-1) {
    playerTurn=1; placeBallAtTee(); holeStrokes[1]=0;
    state='aiming'; drag=null; trailPoints=[]; ballInHole=false; celebrating=false;
    playerBanner={text:"Player 2's Turn",timer:100,color:PLAYER_COLORS[1]};
  } else {
    if(holeIdx<8){playerTurn=0;holeIdx++;startHole();}
    else showFinalScore();
  }
}

let playerBanner=null;

function draw() {
  ctx.save(); ctx.translate(-camX,0);
  const hole=HOLES[holeIdx];
  // Sky
  const sky=ctx.createLinearGradient(0,0,0,H*.6);
  sky.addColorStop(0,'#0f172a'); sky.addColorStop(1,'#164e63');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,0.07)';
  [[80,60,120,35],[250,45,90,28],[500,55,150,40],[700,40,100,30]].forEach(([x,y,w,h])=>{ctx.beginPath();ctx.ellipse(x,y,w,h,0,0,Math.PI*2);ctx.fill();});
  // Terrain
  const pts=getTP(hole), grad=ctx.createLinearGradient(0,H*.4,0,H);
  grad.addColorStop(0,'#16a34a'); grad.addColorStop(.15,'#15803d'); grad.addColorStop(.15,'#92400e'); grad.addColorStop(1,'#78350f');
  ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
  pts.forEach(([x,y])=>ctx.lineTo(x,y)); ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
  ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
  pts.slice(0,pts.length-2).forEach(([x,y])=>ctx.lineTo(x,y));
  ctx.strokeStyle='#4ade80'; ctx.lineWidth=2.5; ctx.stroke();
  // Tee
  const tx=hole.tee.x*W, ty=terrainY(hole.tee.x*W,hole);
  ctx.fillStyle='#fbbf24'; ctx.fillRect(tx-12,ty-3,24,3);
  // Flag
  const fpx=hole.pin.x*W, fpy=terrainY(hole.pin.x*W,hole);
  ctx.beginPath(); ctx.ellipse(fpx,fpy-1,10,4,0,0,Math.PI*2); ctx.fillStyle='#111'; ctx.fill();
  ctx.beginPath(); ctx.moveTo(fpx,fpy-2); ctx.lineTo(fpx,fpy-55); ctx.strokeStyle='#d1d5db'; ctx.lineWidth=2; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(fpx,fpy-55); ctx.lineTo(fpx+22,fpy-46); ctx.lineTo(fpx,fpy-37); ctx.closePath(); ctx.fillStyle='#ef4444'; ctx.fill();
  // Trail
  for(let i=1;i<trailPoints.length;i++) {
    const a=(i/trailPoints.length)*.6;
    ctx.beginPath(); ctx.moveTo(trailPoints[i-1].x,trailPoints[i-1].y-5); ctx.lineTo(trailPoints[i].x,trailPoints[i].y-5);
    ctx.strokeStyle=`rgba(253,224,71,${a})`; ctx.lineWidth=2; ctx.stroke();
  }
  // Particles
  splashParticles.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,2.5,0,Math.PI*2);ctx.fillStyle=`rgba(134,97,60,${p.life/60})`;ctx.fill();});
  // Ball
  if(!ballInHole||celebrating) {
    ctx.save(); ctx.shadowColor=PLAYER_COLORS[playerTurn]; ctx.shadowBlur=celebrating?20:8;
    ctx.beginPath(); ctx.arc(ball.x,ball.y-5,7,0,Math.PI*2); ctx.fillStyle='white'; ctx.fill();
    ctx.strokeStyle='#cbd5e1'; ctx.lineWidth=1; ctx.stroke(); ctx.restore();
  }
  // Aim guide
  if(state==='aiming'&&drag&&drag.cur) {
    const dx=ball.x-drag.cur.x, dy=ball.y-drag.cur.y, dist=Math.sqrt(dx*dx+dy*dy);
    const pwr=Math.min(dist/120,1), spd=pwr*22;
    let sx=ball.x,sy=ball.y-5,svx=dx/dist*spd,svy=dy/dist*spd;
    ctx.save();
    for(let i=0;i<12;i++){svx+=windNow;svy+=GRAV;sx+=svx;sy+=svy;ctx.beginPath();ctx.arc(sx,sy,3-i*.15,0,Math.PI*2);ctx.fillStyle=`rgba(253,224,71,${.7-i*.055})`;ctx.fill();}
    ctx.restore();
    ctx.save();ctx.strokeStyle='rgba(148,163,184,0.4)';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(ball.x,ball.y-5);ctx.lineTo(drag.cur.x,drag.cur.y);ctx.stroke();ctx.restore();
    const bx=ball.x-camX-40, by=ball.y-35;
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.roundRect(bx-2,by-2,84,14,4); ctx.fill();
    ctx.fillStyle=pwr<.5?'#4ade80':pwr<.8?'#facc15':'#ef4444'; ctx.roundRect(bx,by,80*pwr,10,3); ctx.fill();
    ctx.strokeStyle='#94a3b8';ctx.lineWidth=1;ctx.roundRect(bx,by,80,10,3);ctx.stroke();
  }
  ctx.restore();
  // HUD
  const hole2=HOLES[holeIdx];
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,W,38);
  ctx.font='bold 13px Arial';
  ctx.fillStyle='#94a3b8'; ctx.fillText(`HOLE ${holeIdx+1}/9`,10,24);
  ctx.fillStyle='#fbbf24'; ctx.fillText(`PAR ${hole2.par}`,90,24);
  const wDir=windNow>0?'→':'←';
  ctx.fillStyle='#7dd3fc'; ctx.fillText(`WIND ${wDir} ${Math.abs(windNow*100).toFixed(0)}`,W/2-50,24);
  ctx.fillStyle=PLAYER_COLORS[playerTurn];
  const pl=`${PLAYERS[playerTurn]}  ${holeStrokes[playerTurn]} stroke${holeStrokes[playerTurn]!==1?'s':''}`;
  ctx.fillText(pl,W-ctx.measureText(pl).width-10,24);
  scores[0].forEach((s,i)=>{
    const d=s-HOLES[i].par; ctx.font='10px Arial';
    ctx.fillStyle=d<0?'#4ade80':d>0?'#f87171':'#fbbf24';
    ctx.fillText(`H${i+1}: P1:${s} P2:${scores[1][i]??'-'}`,10,50+i*14);
  });
  // Celebration
  if(celebrating) {
    celebTimer--;if(celebTimer<=0)celebrating=false;
    const t=1-celebTimer/90;
    for(let i=0;i<3;i++){const a=Math.random()*Math.PI*2,r=t*60;ctx.beginPath();ctx.arc(ball.x+Math.cos(a)*r,ball.y-5+Math.sin(a)*r,3,0,Math.PI*2);ctx.fillStyle=`hsl(${Math.random()*360},90%,65%)`;ctx.fill();}
    const diff=holeStrokes[playerTurn]-HOLES[holeIdx].par;
    const names=['Albatross!','Eagle!','Birdie!','Par','Bogey','Double Bogey','Triple+'];
    const colors=['#a78bfa','#facc15','#4ade80','#60a5fa','#fb923c','#f87171','#ef4444'];
    const idx=Math.max(0,Math.min(6,diff+3));
    ctx.save();ctx.font=`bold ${28+Math.sin(celebTimer*.15)*3}px Arial`;ctx.fillStyle=colors[idx];ctx.textAlign='center';ctx.shadowColor='black';ctx.shadowBlur=8;
    ctx.fillText(names[idx],W/2,H/2-20);ctx.font='18px Arial';ctx.fillStyle='white';ctx.fillText(`${PLAYERS[playerTurn]}: ${holeStrokes[playerTurn]} strokes`,W/2,H/2+15);ctx.restore();
  }
  // Banners
  if(banner) {
    banner.timer--;const a=Math.min(1,banner.timer/20);
    ctx.save();ctx.globalAlpha=a;ctx.fillStyle='rgba(0,0,0,0.6)';ctx.roundRect(W/2-150,H/2-30,300,55,10);ctx.fill();
    ctx.fillStyle='#4ade80';ctx.font='bold 22px Arial';ctx.textAlign='center';ctx.fillText(banner.text,W/2,H/2+8);ctx.restore();
    if(banner.timer<=0)banner=null;
  }
  if(playerBanner) {
    playerBanner.timer--;const a=Math.min(1,playerBanner.timer/15);
    ctx.save();ctx.globalAlpha=a;ctx.fillStyle='rgba(0,0,0,0.65)';ctx.roundRect(W/2-140,H/2-25,280,48,10);ctx.fill();
    ctx.fillStyle=playerBanner.color;ctx.font='bold 20px Arial';ctx.textAlign='center';ctx.fillText(playerBanner.text,W/2,H/2+7);ctx.restore();
    if(playerBanner.timer<=0)playerBanner=null;
  }
}

function loop(){update();draw();requestAnimationFrame(loop);}

function showFinalScore() {
  const ov=document.getElementById('overlay'); ov.classList.remove('hidden');
  const t1=scores[0].reduce((a,b)=>a+b,0), t2=scores[1].reduce((a,b)=>a+b,0);
  const tp=HOLES.reduce((a,h)=>a+h.par,0), d1=t1-tp, d2=t2-tp;
  const winner=t1<t2?PLAYERS[0]:t2<t1?PLAYERS[1]:'Tie';
  let rows='';
  for(let i=0;i<9;i++){
    const par=HOLES[i].par,s1=scores[0][i]??'-',s2=scores[1][i]??'-';
    const c1=typeof s1==='number'?(s1<par?'under':s1>par?'over':'even'):'';
    const c2=typeof s2==='number'?(s2<par?'under':s2>par?'over':'even'):'';
    rows+=`<tr><td>H${i+1}</td><td>Par ${par}</td><td class="${c1}">${s1}</td><td class="${c2}">${s2}</td></tr>`;
  }
  ov.innerHTML=`<h1>&#9971; Final Scorecard</h1><h2>${winner==='Tie'?"It's a Tie!":`&#127942; ${winner} Wins!`}</h2>
    <table class="score-table"><tr><th>Hole</th><th>Par</th><th style="color:${PLAYER_COLORS[0]}">${PLAYERS[0]}</th><th style="color:${PLAYER_COLORS[1]}">${PLAYERS[1]}</th></tr>
    ${rows}<tr class="total-row"><td colspan="2">TOTAL</td><td class="${d1<0?'under':d1>0?'over':'even'}">${t1} (${d1>=0?'+':''}${d1})</td><td class="${d2<0?'under':d2>0?'over':'even'}">${t2} (${d2>=0?'+':''}${d2})</td></tr></table>
    <button id="bigBtn" onclick="location.reload()">Play Again</button>`;
}

loop();
</script>
</body>
</html>
